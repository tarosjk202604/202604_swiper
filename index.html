<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiper Demo</title>
    <!-- Swiper -->
    <link rel="stylesheet" href="js/swiper/swiper-bundle.min.css">
    <script src="js/swiper/swiper-bundle.min.js" defer></script>

    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>

<body>

    <div class="swiper slideshow">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <img src="https://picsum.photos/id/345/1600/900" alt="">
            </div>
            <div class="swiper-slide">
                <img src="https://picsum.photos/id/66/1600/900" alt="">
            </div>
            <div class="swiper-slide">
                <img src="https://picsum.photos/id/744/1600/900" alt="">
            </div>
            <div class="swiper-slide">
                <img src="https://picsum.photos/id/423/1600/900" alt="">
            </div>
            <div class="swiper-slide">
                <img src="https://picsum.photos/id/824/1600/900" alt="">
            </div>
        </div>
        <!-- ナビゲーションボタン -->
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
        <!-- ページネーション -->
        <div class="swiper-pagination"></div>
        <!-- 秒数表示 -->
        <div class="time-left"></div>
    </div>

</body>

</html>
